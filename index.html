<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=frontend/login.html">
  <title>JYOTISH 3.0 — Tamil Vedic Astrology</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; color: #fff;
    }
    .loader {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    .logo { font-size: 3rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.8rem; color: #f59e0b; margin-bottom: 0.3rem; }
    p  { color: #94a3b8; font-size: 0.95rem; }
    .dots { margin-top: 1.5rem; }
    .dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; background: #f59e0b; margin: 0 4px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    a { color: #f59e0b; text-decoration: none; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="logo">🔮</div>
    <h1>JYOTISH 3.0</h1>
    <p>Tamil Vedic Astrology Platform</p>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p style="margin-top:1.2rem; font-size:0.8rem;">
      Not redirecting? <a href="frontend/login.html">Click here</a>
    </p>
  </div>
</body>
</html>
